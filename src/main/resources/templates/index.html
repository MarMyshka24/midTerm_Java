<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Университет — Управление</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 50px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 28px;
            color: #2c3e50;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 14px 0;
            background-color: #4a90e2;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 10px;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #357abd;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Добро пожаловать в систему университета</h1>

    <a href="/students" class="btn">Управление студентами</a>
    <a href="/courses" class="btn">Управление курсами</a>
    <a href="/assign" class="btn">Назначить студента на курс</a>
</div>

</body>
</html>
