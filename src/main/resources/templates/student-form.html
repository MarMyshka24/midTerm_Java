<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить студента</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            background: #ffffff;
            padding: 40px 30px;
            width: 480px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 25px;
            font-size: 24px;
            color: #2c3e50;
            text-align: center;
        }

        .error-box {
            background: #ffe5e5;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dcdcdc;
            font-size: 14px;
            transition: border 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            text-decoration: none;
            color: #4a90e2;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Добавить студента</h1>

    <div th:if="${error}" class="error-box">
        <strong>Ошибка:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/students}" method="post">

        <div class="form-group">
            <input type="text" name="firstName" placeholder="Имя" required />
        </div>

        <div class="form-group">
            <input type="text" name="lastName" placeholder="Фамилия" required />
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required />
        </div>

        <div class="form-group">
            <input type="text" name="address" placeholder="Адрес" required />
        </div>

        <div class="form-group">
            <input type="text" name="phone" placeholder="Телефон" required />
        </div>

        <div class="form-group">
            <input type="date" name="birthDate" required />
        </div>

        <button type="submit">Добавить</button>
    </form>

    <div class="back-link">
        <a th:href="@{/students}">← Назад</a>
    </div>
</div>

</body>
</html>
