<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список студентов</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f6f9;
            color: #2c3e50;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: #4a90e2;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) td {
            background-color: #f9f9f9;
        }

        tr td {
            background-color: #ffffff;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background-color: #c0392b;
            transform: scale(1.08);
        }

        .back {
            display: block;
            margin: 30px auto 0;
            text-align: center;
            color: #4a90e2;
            font-weight: bold;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Список студентов</h1>

<a href="/students/new" class="add-btn">Добавить студента</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Email</th>
        <th>Адрес</th>
        <th>Телефон</th>
        <th>Дата рождения</th>
        <th>Курсы</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${students}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.firstName}"></td>
        <td th:text="${s.lastName}"></td>
        <td th:text="${s.email}"></td>
        <td th:text="${s.profile?.address}"></td>
        <td th:text="${s.profile?.phone}"></td>
        <td th:text="${s.profile?.birthDate}"></td>
        <td th:text="${#lists.size(s.courses)}"></td>
        <td>
            <button class="btn-delete" th:onclick="'deleteStudent(' + ${s.id} + ')'">Удалить</button>
        </td>
    </tr>
    </tbody>
</table>

<a href="/" class="back">← На главную</a>

<script th:inline="javascript">
    function deleteStudent(id) {
        if (confirm('Удалить студента?')) {
            fetch('/api/students/' + id, { method: 'DELETE' })
                .then(r => {
                    if (r.ok) window.location.reload();
                    else alert('Ошибка удаления');
                })
                .catch(() => alert('Ошибка связи'));
        }
    }
</script>

</body>
</html>
